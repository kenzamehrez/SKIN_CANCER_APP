<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h2 class="fw-bold text-dark">Tableau de bord</h2>
        <a class="btn btn-outline-danger btn-sm" href="/logout">Déconnexion</a>
    </div>
    
    <div class="row g-4 mt-2">
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0 p-3">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title fw-bold text-primary">Nouvelle analyse</h5>
                        <p class="card-text text-muted">Exécuter un nouvel algorithme de diagnostic médical à partir des données ou images d'un patient.</p>
                    </div>
                    <a class="btn btn-primary w-100 mt-3" href="/predict">Lancer une analyse</a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0 p-3">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title fw-bold text-info">Base de données</h5>
                        <p class="card-text text-muted">Consulter, trier et analyser l'historique complet des dossiers et diagnostics des patients.</p>
                    </div>
                    <a class="btn btn-info text-white w-100 mt-3" href="/patient">Voir les patients</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
