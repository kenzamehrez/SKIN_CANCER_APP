<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm border-0 p-4">
        <h2 class="fw-bold text-dark mb-4">Analyse patient</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom complet</label>
                <input class="form-control" type="text" name="name" placeholder="Ex: Jean Dupont" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Âge</label>
                <input class="form-control" type="number" name="age" placeholder="Ex: 45" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold">Fichier ou Image Médicale</label>
                <input class="form-control" type="file" name="image" required>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1 py-2 fw-semibold">Lancer l'analyse</button>
                <a href="/dashboard" class="btn btn-light border py-2 px-3">Annuler</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
