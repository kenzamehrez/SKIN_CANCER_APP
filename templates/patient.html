<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Liste des patients</h2>
        <a href="/dashboard" class="btn btn-outline-secondary">Retour</a>
    </div>

    <div class="table-responsive custom-table">
        <table class="table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th scope="col" class="ps-4">Nom</th>
                    <th scope="col">Âge</th>
                    <th scope="col">Résultat</th>
                    <th scope="col">Probabilité</th>
                    <th scope="col" class="pe-4">Image</th>
                </tr>
            </thead>
            <tbody>
                {% for p in patients %}
                <tr>
                    <td class="ps-4 fw-semibold">{{ p.name }}</td>
                    <td>{{ p.age }} ans</td>
                    <td>
                        <span class="badge {{ 'bg-danger' if 'positif' in p.result.lower() else 'bg-success' }} py-2 px-3">
                            {{ p.result }}
                        </span>
                    </td>
                    <td class="fw-bold text-secondary">{{ (p.probability * 100) | round(2) }}%</td>
                    <td class="pe-4">
                        <img src="{{ p.image_url if p.image_url else '#' }}" width="60" height="60" class="patient-thumb" alt="Patient scan">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
